name: Build ESP32-S3 NAT Router Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Reset Environment
        run: |
          # Matikan total sistem pengunduh otomatis yang bikin error
          export IDF_COMPONENT_MANAGER=0
          echo "IDF_COMPONENT_MANAGER=0" >> $GITHUB_ENV
          
          # Hapus semua file manifest agar tidak ada library luar yang dipanggil
          find . -name "idf_component.yml" -delete
          
          # Konfigurasi hardware 16MB/OPI (Sesuai spek S3 Anda)
          cat <<EOF > sdkconfig.defaults
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_SPIRAM_MODE_OCT=y
          CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
          CONFIG_LWIP_IP_FORWARD=y
          CONFIG_LWIP_IPV4_NAPT=y
          EOF
          
          rm -f sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3-nat
          path: build/*.bin
          

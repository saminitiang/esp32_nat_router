name: Build ESP32-S3 NAT Router V5-Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Patch and Configure
        run: |
          # Hapus manifest agar tidak mendownload Wireguard (biang kerok error)
          find . -name "idf_component.yml" -delete
          
          # Konfigurasi hardware S3 16MB OPI sesuai milik Anda
          cat <<EOF > sdkconfig.defaults
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_SPIRAM_MODE_OCT=y
          CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
          CONFIG_LWIP_IP_FORWARD=y
          CONFIG_LWIP_IPV4_NAPT=y
          EOF
          
          rm -f sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nat-router-s3-v5
          path: build/*.bin
          

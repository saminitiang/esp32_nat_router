name: Build ESP32-S3 NAT Router Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Patch and Force Config
        run: |
          # Matikan pencarian library Wireguard yang merusak build
          find . -name "idf_component.yml" -delete
          
          # Paksa konfigurasi hardware untuk S3 16MB OPI Anda
          cat <<EOF > sdkconfig.defaults
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_SPIRAM_MODE_OCT=y
          CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
          CONFIG_LWIP_IP_FORWARD=y
          CONFIG_LWIP_IPV4_NAPT=y
          CONFIG_ESP_WIREGUARD=n
          EOF
          
          # Hapus cache sdkconfig lama
          rm -f sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nat-router-esp32s3-16mb
          path: build/*.bin
          

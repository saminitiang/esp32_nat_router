name: Build ESP32-S3 NAT Router Precise

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Create Clean Config
        run: |
          # Buat file baru khusus untuk konfigurasi hardware Anda
          cat <<EOF > sdkconfig.defaults
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
          CONFIG_SPIRAM_MODE_OCT=y
          CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
          CONFIG_LWIP_IP_FORWARD=y
          CONFIG_LWIP_IPV4_NAPT=y
          EOF
          # Hapus sdkconfig lama agar tidak bentrok
          rm -f sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-precise-firmware
          path: build/*.bin
          

name: Build ESP32-S3 NAT Router Precise

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Fix Manifest and Components
        run: |
          # Hapus manifest yang bikin error sebelumnya
          find . -name "idf_component.yml" -delete
          
          # Paksa konfigurasi hardware 16MB/OPI
          cat <<EOF > sdkconfig.defaults
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y
          CONFIG_SPIRAM_MODE_OCT=y
          CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
          CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
          CONFIG_LWIP_IP_FORWARD=y
          CONFIG_LWIP_IPV4_NAPT=y
          EOF
          
          rm -f sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v4.4
          target: esp32s3
          # Tambahkan perintah reconfigure untuk resolve dependencies
          command: idf.py reconfigure && idf.py build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-precise-firmware
          path: build/*.bin
          

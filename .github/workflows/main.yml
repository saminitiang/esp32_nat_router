name: Build ESP32-S3 NAT Router Precise

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Force Hardware Config
        run: |
          # Mengatur Target dan Fitur NAT
          echo "CONFIG_IDF_TARGET=\"esp32s3\"" >> sdkconfig
          echo "CONFIG_LWIP_IP_FORWARD=y" >> sdkconfig
          echo "CONFIG_LWIP_IPV4_NAPT=y" >> sdkconfig
          
          # Mengatur OPI PSRAM & 16MB Flash sesuai gambar Arduinodroid Anda
          echo "CONFIG_SPIRAM_MODE_OCT=y" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y" >> sdkconfig
          echo "CONFIG_ESPTOOLPY_FLASHMODE_QIO=y" >> sdkconfig
          echo "CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y" >> sdkconfig

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1
          target: esp32s3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-precise-firmware
          path: build/*.bin
          
